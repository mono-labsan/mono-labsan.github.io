baseURL = "https://mono-labsan.github.io/"
languageCode = "ja"
title = "モノラボ"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
paginate = 15
enableEmoji = true
hasCJKLanguage = true

[sitemap]
  changefreq = "daily"
  filename   = "sitemap.xml"
  priority   = 0.5

[params]
  env         = "production"
  title       = "モノラボ"
  description = "ガジェット・デジタル機器を本音でレビュー。モノラボが実際に試した比較情報を毎日更新。イヤホン・スマホ・PCアクセサリーなど幅広くカバー。"
  keywords    = ["ガジェット", "比較", "レビュー", "おすすめ", "ランキング", "イヤホン", "スマホ", "PCアクセサリー", "デジタル機器"]
  author      = "ガジェット比較ナビ編集部"

  ShowReadingTime    = true
  ShowShareButtons   = true
  ShowPostNavLinks   = true
  ShowBreadCrumbs    = true
  ShowCodeCopyButtons = false
  ShowToc            = true
  TocOpen            = true
  ShowFullTextinRSS  = true
  defaultTheme       = "dark"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title   = "🔬 モノラボ"
    Content = "ガジェット・デジタル機器を本音でレビュー。実際に試して比較した情報を毎日更新中。"

  [params.cover]
    hidden          = false
    hiddenInList    = false
    hiddenInSingle  = false
    linkFullImages  = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort      = true
    location        = 0
    distance        = 1000
    threshold       = 0.4
    minMatchCharLength = 2
    keys            = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "home"
    name       = "ホーム"
    url        = "/"
    weight     = 10
  [[menu.main]]
    identifier = "categories"
    name       = "カテゴリ"
    url        = "/categories/"
    weight     = 20
  [[menu.main]]
    identifier = "tags"
    name       = "タグ"
    url        = "/tags/"
    weight     = 30
  [[menu.main]]
    identifier = "search"
    name       = "🔍"
    url        = "/search/"
    weight     = 40

[taxonomies]
  category = "categories"
  tag      = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML   = true
  minifyOutput = true
