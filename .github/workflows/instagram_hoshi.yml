name: Hoshi 毎日Instagram・TikTok投稿

on:
  schedule:
    # 毎日18:00 JST（= 09:00 UTC）に実行
    - cron: '0 9 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  post-hoshi:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: FFmpeg をインストール
        run: sudo apt-get install -y ffmpeg

      - name: Pythonパッケージをインストール
        run: pip install fal-client cloudinary requests

      - name: ほし動画を生成してInstagram・TikTokに投稿
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: python scripts/instagram_hoshi.py

      - name: 使用済みシーンをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/hoshi_used_scenes.json
          git diff --staged --quiet || git commit -m "chore: hoshi 使用済みシーン更新"
          git push
